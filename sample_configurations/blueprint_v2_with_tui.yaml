# Blueprint V2 Config with TUI Dashboard — 100BB HU, full training run
game:
  players: 2
  stack_depth: 100.0
  small_blind: 0.5
  big_blind: 1.0

clustering:
  algorithm: potential_aware_emd
  preflop:
    buckets: 169
  flop:
    buckets: 100
  turn:
    buckets: 100
  river:
    buckets: 100

action_abstraction:
  preflop:
    - ["2.5bb"]
    - ["3.0x"]
  flop:
    - [0.33, 0.67, 1.0]
    - [0.5, 1.0]
  turn:
    - [0.5, 1.0]
    - [0.67, 1.0]
  river:
    - [0.5, 1.0]
    - [1.0]

training:
  cluster_path: "clusters/"
  time_limit_minutes: 720
  lcfr_warmup_iterations: 5000000
  prune_after_iterations: 5000000
  batch_size: 600

snapshots:
  resume: true
  warmup_minutes: 60
  snapshot_every_minutes: 30
  output_dir: "snapshots/"
  # resume: true  # resume from latest snapshot if output_dir has existing snapshots

tui:
  enabled: true
  refresh_rate_ms: 500
  telemetry:
    strategy_delta_interval_seconds: 30
    sparkline_window: 60
  scenarios:
    - name: "SB Open"
      player: SB
      actions: []
    - name: "BB vs 2.5x"
      player: BB
      actions: ["raise-0"]
    - name: "SB Cbet K72"
      player: SB
      actions: ["raise-0", "call"]
      board: ["Kh", "7s", "2d"]
      street: flop
  random_scenario:
    enabled: true
    hold_minutes: 3
    pool: ["preflop", "flop", "turn"]
