  - name: "Dry rainbow K-high"
    board: ["Ks", "7d", "2c"]
    oop_range: "22+,A2s+,K2s+,Q8s+,J8s+,T8s+,98s,87s,76s,65s,A2o+,K9o+,QTo+,JTo"
    ip_range: "22-TT,A2s-ATs,K2s+,Q2s+,J6s+,T6s+,96s+,86s+,76s,65s,54s,A2o-ATo,K5o+,Q8o+,J8o+,T8o+"
    pot: 6.0
    effective_stack: 97.0

