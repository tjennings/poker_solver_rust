# Canonical validation spots for blueprint strategy comparison.
#
# Each spot defines a postflop scenario with board, ranges, pot, and stack.
# The validate-blueprint command solves each spot with the exact range solver
# and compares against the blueprint's abstracted strategy.
#
# Ranges are SB open (2.5x) vs BB call for 100BB 6-max.

spots:
