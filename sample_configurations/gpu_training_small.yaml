# Small GPU training stack config for quick testing.
# Trains 3 CFVNet models (turn → flop → preflop) using a pre-trained river model.
#
# Usage:
#   cargo run -p poker-solver-trainer --release --features cuda,gpu-training -- \
#     gpu-train-stack -c sample_configurations/gpu_training_small.yaml -o /tmp/small_stack

game:
  initial_stack: 200
  bet_sizes: ["50%", "100%", "a"]
  ref_pot: 100
  ref_stack: 100

river_model:
  path: "local_data/models/river_v7/checkpoint_epoch340"
  hidden_layers: 7
  hidden_size: 768

model:
  hidden_layers: 4
  hidden_size: 256

training:
  train_batch_size: 512
  train_steps_per_batch: 5
  learning_rate: 0.001
  huber_delta: 1.0
  aux_loss_weight: 1.0
  seed: 42

turn:
  num_samples: 500000
  solve_iterations: 2000
  batch_size: 500
  reservoir_capacity: 50000
  validation_interval: 10000
  checkpoint_interval: 500000

flop:
  num_samples: 500000
  solve_iterations: 2000
  batch_size: 200
  reservoir_capacity: 50000
  validation_interval: 10000
  checkpoint_interval: 500000

preflop:
  num_samples: 200000
  batch_size: 1
  reservoir_capacity: 50000
  validation_interval: 10000
  checkpoint_interval: 200000
