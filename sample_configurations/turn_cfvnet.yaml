# Turn CFVnet training configuration
# Uses trained river model as leaf evaluator
#
# Datagen:
#   cargo run -p cfvnet --release -- generate \
#     -c sample_configurations/turn_cfvnet.yaml \
#     -o data/turn/turn.bin \
#     --per-file 1000000
#
# Training (CUDA):
#   cargo run -p cfvnet --release --features cuda -- train \
#     -c sample_configurations/turn_cfvnet.yaml \
#     -d data/turn/ -o models/turn_v1 --backend cuda

game:
  initial_stack: 200 # 100bb in SB units
  bet_sizes: ["25%", "50%", "100%", "a"]
  board_size: 4
  add_allin_threshold: 1.5
  force_allin_threshold: 0.15
  river_model_path: "local_data/models/river_v7/checkpoint_epoch340"

datagen:
  street: "turn"
  num_samples: 5000000
  pot_intervals: [[4, 50], [50, 100], [100, 150], [150, 200]]
  spr_intervals: [[0.0, 0.5], [0.5, 1.5], [1.5, 4.0], [4.0, 8.0], [8.0, 50.0]]
  solver_iterations: 5000
  target_exploitability: 0.005
  leaf_eval_interval: 1000
  threads: 16

training:
  hidden_layers: 7
  hidden_size: 768
  batch_size: 8192
  epochs: 500
  learning_rate: 0.002
  lr_min: 0.00002
  huber_delta: 1.0
  aux_loss_weight: 1.0
  validation_split: 0.05
  checkpoint_every_n_epochs: 10
  shuffle_buffer_size: 262144
  prefetch_depth: 4
