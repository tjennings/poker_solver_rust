# Perf test config — 1000 samples per street, minimal model.
# Should complete in minutes. Used for profiling the pipeline.

game:
  initial_stack: 200
  bet_sizes: ["50%", "a"]
  ref_pot: 100
  ref_stack: 100

river_model:
  path: "local_data/models/river_v7/checkpoint_epoch340"
  hidden_layers: 7
  hidden_size: 768

model:
  hidden_layers: 2
  hidden_size: 64

training:
  train_batch_size: 64
  train_steps_per_batch: 2
  learning_rate: 0.001
  huber_delta: 1.0
  aux_loss_weight: 1.0
  seed: 42

turn:
  num_samples: 1000
  solve_iterations: 100
  batch_size: 50
  reservoir_capacity: 2000
  validation_interval: 500
  checkpoint_interval: 100000

flop:
  num_samples: 1000
  solve_iterations: 100
  batch_size: 20
  reservoir_capacity: 2000
  validation_interval: 500
  checkpoint_interval: 100000

preflop:
  num_samples: 1000
  reservoir_capacity: 2000
  validation_interval: 500
  checkpoint_interval: 100000
