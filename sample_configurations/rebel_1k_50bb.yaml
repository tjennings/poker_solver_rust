blueprint_path: "./local_data/blueprints/1k_50bb_sapcfr/snap"
cluster_dir: "./local_data/blueprints/1k_50bb_sapcfr/snap/buckets"
output_dir: "./local_data/rebel/1k_50bb"

game:
  initial_stack: 100   # 50bb × 2 chips per bb
  small_blind: 1
  big_blind: 2

seed:
  num_hands: 500000
  seed: 42
  threads: 16
  solver_iterations: 512
  target_exploitability: 0.01
  bet_sizes:
    # Match the blueprint's postflop bet sizes (pot fractions)
    flop:
      - [0.25, 0.33, 0.75, 1.0]   # OOP
      - [0.33, 0.67, 1.0, 1.5]    # IP
    turn:
      - [0.25, 0.33, 0.75, 1.0]
      - [0.33, 0.75, 1.0, 1.5]
    river:
      - [0.25, 0.33, 0.75, 1.0]
      - [0.33, 0.75, 1.0, 1.5]

training:
  hidden_layers: 7
  hidden_size: 500
  batch_size: 4096
  epochs: 200
  learning_rate: 0.0003

buffer:
  max_records: 12000000
  path: "rebel_buffer.bin"

inference:
  batch_size: 512
  batch_timeout_us: 50
  train_every_n_solves: 10
  train_batch_size: 4096
  replay_capacity: 200000
  learning_rate: 0.0003
