# Blueprint V2 Toy Config — 10BB, small buckets, trains in minutes
game:
  name: "HU 10BB Toy"
  players: 2
  stack_depth: 20
  small_blind: 1
  big_blind: 2

clustering:
  algorithm: potential_aware_emd
  preflop:
    buckets: 50
  flop:
    buckets: 50
  turn:
    buckets: 50
  river:
    buckets: 50
  seed: 42
  kmeans_iterations: 50

action_abstraction:
  preflop:
    - ["5bb"]
    - ["3.0x"]
  flop:
    - [0.5, 1.0]
    - [1.0]
  turn:
    - [0.5, 1.0]
  river:
    - [0.5, 1.0]

training:
  cluster_path: clusters/toy/
  time_limit_minutes: 5
  lcfr_warmup_iterations: 10000
  lcfr_discount_interval: 5000
  prune_after_iterations: 10000
  prune_explore_pct: 0.05
  print_every_minutes: 1

snapshots:
  warmup_minutes: 1
  snapshot_every_minutes: 1
  output_dir: runs/toy/
