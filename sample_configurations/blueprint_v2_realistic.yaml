# Blueprint V2 Realistic Config — 100BB, 200 buckets, multi-hour training
game:
  players: 2
  stack_depth: 100.0
  small_blind: 0.5
  big_blind: 1.0

clustering:
  algorithm: potential_aware_emd
  preflop:
    buckets: 169
  flop:
    buckets: 200
  turn:
    buckets: 200
  river:
    buckets: 200
  seed: 42
  kmeans_iterations: 100

action_abstraction:
  preflop:
    - ["2.5bb"]
    - ["3.0x"]
    - ["3.0x"]
  flop:
    - [0.33, 0.67, 1.0]
    - [0.5, 1.0]
    - [1.0]
  turn:
    - [0.5, 1.0]
    - [1.0]
  river:
    - [0.5, 1.0]
    - [1.0]
  max_raises: 3

training:
  cluster_path: clusters/realistic/
  time_limit_minutes: 480
  lcfr_warmup_minutes: 400
  lcfr_discount_interval: 10
  prune_after_minutes: 200
  prune_threshold: -310000000
  prune_explore_pct: 0.05
  print_every_minutes: 10

snapshots:
  warmup_minutes: 60
  snapshot_every_minutes: 30
  output_dir: runs/realistic/
