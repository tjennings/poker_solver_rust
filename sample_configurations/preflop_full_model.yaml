# Smoke test: exercises the full postflop 169-hand MCCFR pipeline in ~1-2 minutes.
# Tweak these values to debug specific phases.
#
# Usage:
#   cargo run -p poker-solver-trainer --release -- solve-preflop \
#     -c sample_configurations/AKQr_vs_234r.yaml -o smoke_test
#
# Validation: AA (hand 0) should raise more than 72o (hand 168).

# -- Training parameters --

iterations: 80000

print_every: 200
preflop_exploitability_threshold_mbb: 0.01
ev_diagnostic_hands: "AA,KK,QQ,AKs,AKo,K9s,K7s,K5s,Q9s,Q8s,Q7s,JTs,J9s,T9s,T8s,98s,87s,76s,65s,A5s,72o"
equity_samples: 10000
checkpoint_every: 1000

# -- Game structure --

positions:
  - name: Small Blind
    short_name: SB
  - name: Big Blind
    short_name: BB

blinds:
  - [0, 1]
  - [1, 2]

antes: []

stacks: [100, 100]  # 25 BB

raise_sizes:
  - ["2bb", "6bb", "18bb"]
  - ["0.33p", "0.5p", "1.0p", "1.3p"]
  - ["0.33p", "0.5p", "1.0p", "1.3p"]

raise_cap: 4

# -- DCFR discounting --

dcfr_alpha: 1.5
dcfr_beta: 0.5
dcfr_gamma: 2.0
dcfr_warmup: 500
exploration: 0.07

# -- Postflop model (169-hand MCCFR, minimal for fast validation) --
postflop_model_path: ./local_data/full_postflop

