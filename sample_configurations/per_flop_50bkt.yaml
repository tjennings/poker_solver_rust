# Per-Flop Blueprint V2 Config — 100BB HU, 50 buckets per street (per-flop)
game:
  name: "per_flop_50bkt"
  players: 2
  stack_depth: 100.0
  small_blind: 0.5
  big_blind: 1.0

clustering:
  preflop:
    buckets: 169
  flop:
    buckets: 50
  turn:
    buckets: 50
  river:
    buckets: 50
  per_flop:
    flop_buckets: 50
    turn_buckets: 50
    river_buckets: 50

action_abstraction:
  preflop:
    - ["2.5bb"]
    - ["4bb", "6bb"]
    - ["18bb"]
  flop:
    - [0.33, 0.67, 1.0]
    - [0.33, 0.67, 2.0]
    - [2.0]
  turn:
    - [0.33, 0.67, 1.0]
    - [0.33, 0.67, 2.0]
    - [2.0]
  river:
    - [0.33, 0.67, 1.0]
    - [0.33, 0.67, 2.0]
    - [2.0]

training:
  cluster_path: "./local_data/clusters_per_flop_50"
  per_flop_regrets: true
  preload_buffer_size: 32
  time_limit_minutes: 7200
  lcfr_warmup_iterations: 5000000
  prune_after_iterations: 5000000
  prune_threshold: 0
  lcfr_discount_interval: 10000000
  batch_size: 2000

snapshots:
  resume: true
  warmup_minutes: 60
  snapshot_every_minutes: 30
  output_dir: "./local_data/blueprints/per_flop_50bkt/snap"

tui:
  enabled: true
  refresh_rate_ms: 2000
  telemetry:
    strategy_delta_interval_seconds: 30
    sparkline_window: 60
  scenarios:
    - name: "SB Open"
      player: SB
      actions: []
    - name: "BB vs 2.5x"
      player: BB
      actions: ["raise-0"]
  random_scenario:
    enabled: true
    hold_minutes: 3
    pool: ["preflop", "flop", "turn", "river"]
