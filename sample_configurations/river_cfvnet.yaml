# River CFVnet training configuration
# Based on Supremus (Zarick et al. 2020)
#
# Datagen:
#   cargo run -p cfvnet --release -- generate \
#     -c sample_configurations/river_cfvnet.yaml \
#     -o data/river/river.bin \
#     --per-file 1000000
#
# Training (CUDA):
#   cargo run -p cfvnet --release --features cuda -- train \
#     -c sample_configurations/river_cfvnet.yaml \
#     -d data/river/ -o models/river_v1 --backend cuda

game:
  initial_stack: 200 # 100bb in SB units
  bet_sizes: ["33%", "50%", "100%", "150%"]
  add_allin_threshold: 1.5
  force_allin_threshold: 0.15

datagen:
  num_samples: 10000000
  pot_range: [4, 200]
  solver_iterations: 10000
  target_exploitability: 0.005
  threads: 8
  seed: 42

training:
  hidden_layers: 7
  hidden_size: 500
  batch_size: 8192
  epochs: 50
  learning_rate: 0.002
  lr_min: 0.00002
  huber_delta: 1.0
  validation_split: 0.05
  checkpoint_every_n_epochs: 1
  gpu_chunk_size: 200000
  epochs_per_chunk: 15
