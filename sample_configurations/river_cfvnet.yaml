# River CFVnet training configuration
# Based on Supremus (Zarick et al. 2020)

game:
  initial_stack: 200 # 100bb in SB units
  bet_sizes: ["25%", "50%", "100%", "a"]
  add_allin_threshold: 1.5
  force_allin_threshold: 0.15

datagen:
  num_samples: 1000000
  pot_intervals: [[4, 20], [20, 80], [80, 200], [200, 400]]
  solver_iterations: 1000
  target_exploitability: 0.005
  threads: 8
  seed: 42

training:
  hidden_layers: 7
  hidden_size: 500
  batch_size: 8192
  epochs: 10
  learning_rate: 0.002
  lr_min: 0.00002
  huber_delta: 1.0
  aux_loss_weight: 1.0
  validation_split: 0.05
  checkpoint_every_n_epochs: 1000
  gpu_chunk_size: 100000
  epochs_per_chunk: 1
