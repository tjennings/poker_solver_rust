# 5-minute training run — enough for convergence signal.
# Uses pre-trained 7x768 river model.

game:
  initial_stack: 200
  bet_sizes: ["50%", "a"]
  ref_pot: 100
  ref_stack: 100

river_model:
  path: "local_data/models/river_v7/checkpoint_epoch340"
  hidden_layers: 7
  hidden_size: 768

model:
  hidden_layers: 4
  hidden_size: 256

training:
  train_batch_size: 256
  train_steps_per_batch: 5
  learning_rate: 0.001
  huber_delta: 1.0
  aux_loss_weight: 1.0
  seed: 42

# Turn: ~3 min at 49 samples/s
turn:
  num_samples: 5000
  solve_iterations: 100
  batch_size: 50
  reservoir_capacity: 5000
  validation_interval: 1000
  checkpoint_interval: 2500

flop:
  num_samples: 2000
  solve_iterations: 100
  batch_size: 20
  reservoir_capacity: 2000
  validation_interval: 500
  checkpoint_interval: 1000

# Preflop: ~seconds (inference-only)
preflop:
  num_samples: 2000
  batch_size: 5
  reservoir_capacity: 2000
  validation_interval: 500
  checkpoint_interval: 1000
