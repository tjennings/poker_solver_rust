postflop_model:
  solve_type: exhaustive
  bet_sizes: [0.33]
  max_raises_per_street: 4  
  postflop_sprs: [10, 5, 2] # captures roughly rfi > call, 3-bet, 4-bet SPRs against a 100bb stack
  value_extraction_samples: 20000
  cfr_convergence_threshold: 50
  ev_convergence_threshold: 0.5
  cfr_variant: dcfr
  prune_warmup: 2
  prune_explore_freq: 10
  prune_regret_threshold: 0
