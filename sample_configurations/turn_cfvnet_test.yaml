# Turn CFVnet — exact mode datagen + training config
#
# Step 1: Precompute blueprint ranges (one-time):
#   cargo run -p cfvnet --release -- precompute-ranges \
#     -b local_data/blueprints/1k_100bb_brdcfr_v2 \
#     -o local_data/cfvnet/preflop_ranges.bin
#
# Step 2: Generate training data (turn + river):
#   cargo run -p cfvnet --release -- generate \
#     -c sample_configurations/turn_cfvnet_test.yaml
#
# Step 3: Train turn model (Mac/wgpu):
#   cargo run -p cfvnet --release -- train \
#     -c sample_configurations/turn_cfvnet_test.yaml \
#     -d local_data/cfvnet/turn/exact_v1 \
#     -o local_data/models/turn_v1 \
#     --backend wgpu

game:
  initial_stack: 200
  bet_sizes:
    - ["33%", "75%", "a"]     # first bet: 3 sizes
    - ["75%", "a"]             # raises: 2 sizes
  board_size: 5
  #river_model_path: "local_data/models/river_v6/model"

datagen:
  street: "turn"
  mode: "domain"
  blueprint_path: "local_data/cfvnet/preflop_ranges.bin"
  river_output: "local_data/cfvnet/river/exact_v1"
  turn_output: "local_data/cfvnet/turn/exact_v1"
  num_samples: 2000000
  per_file: 10000
  bet_size_fuzz: 0
  pot_intervals: [[4, 50], [50, 150], [150, 400]]
  spr_intervals: [[0.0, 1.0], [1.0, 4.0], [4.0, 50.0]]
  solver_iterations: 1000
  #target_exploitability: 0.05
  threads: 18

training:
  hidden_layers: 7
  hidden_size: 768
  batch_size: 2048
  epochs: 20
  learning_rate: 0.002
  lr_min: 0.0001
  huber_delta: 1.0
  aux_loss_weight: 1.0
  validation_split: 0.1
  checkpoint_every_n_epochs: 5
  shuffle_buffer_size: 8192
  prefetch_depth: 2
