# Blueprint V2 Config — 100BB HU, 200 buckets, SAPCFR+ optimizer + VR-MCCFR baselines
game:
  name: "200_v4_sapcfr"
  players: 2
  stack_depth: 200
  small_blind: 1
  big_blind: 2

clustering:
  algorithm: potential_aware_emd
  preflop:
    buckets: 169
  flop:
    buckets: 200
  turn:
    buckets: 200
    sample_boards: 16432
  river:
    buckets: 200
    sample_boards: 500000

action_abstraction:
  preflop:
    - ["2bb"]
    - ["4bb", "10bb"]
    - ["22bb"]
  flop:
    - [0.25, 0.33, 0.75, 1.0]
    - [0.33, 0.67, 1.0, 1.5]
    - [0.67, 2.0]
  turn:
    - [0.25, 0.33, 0.75, 1.0]
    - [0.33, 0.75, 1.0, 1.5]
    - [0.67, 2.0]
  river:
    - [0.25, 0.33, 0.75, 1.0]
    - [0.33, 0.75, 1.0, 1.5]
    - [0.33, 0.67, 1.0, 2.0]

training:
  cluster_path: "./local_data/buckets/200_v1"
  time_limit_minutes: 7200
  lcfr_warmup_iterations: 300000000
  prune_after_iterations: 100000000
  prune_threshold: -2
  lcfr_discount_interval: 300000000
  batch_size: 4000
  purify_threshold: 0.03
  dcfr_epoch_cap: 40
  # SAPCFR+ optimizer with prediction-based strategy
  optimizer: "sapcfr+"
  sapcfr_eta: 0.33
  dcfr_alpha: 1.5
  dcfr_gamma: 2.0
  # Variance-reducing baselines
  use_baselines: true
  baseline_alpha: 0.05

snapshots:
  resume: true
  warmup_minutes: 60
  snapshot_every_minutes: 30
  output_dir: "./local_data/blueprints/200_v3_100bb_sapcfr_v1"

tui:
  enabled: true
  refresh_rate_ms: 2000
  telemetry:
    strategy_delta_interval_seconds: 120
    sparkline_window: 60
  scenarios:
    - name: "SB Open"
      spot: ""
    - name: "BB vs SB open"
      spot: "sb:2bb"
    - name: "SB vs 3-bet"
      spot: "sb:2bb,bb:4bb"
    - name: "Flop SRP"
      spot: "sb:2bb,bb:call|AsTd9d"
    - name: "Flop 3bet pot"
      spot: "sb:2bb,bb:4bb,sb:call|AsTd9d"
    - name: "BB call rainbow broadway"
      spot: "sb:2bb,bb:call|AsKhQd"
  regret_audits:
    - name: "AKo SB open"
      spot: ""
      hand: "AKo"
      player: SB
    - name: "72o SB open"
      spot: ""
      hand: "72o"
      player: SB
    - name: "QQ BB vs 3bet"
      spot: "sb:2bb,bb:4bb"
      hand: "QQ"
      player: SB
    - name: "AsKs flop SRP"
      spot: "sb:2bb,bb:call|AsTd9d"
      hand: "AsKs"
      player: SB
    - name: "7h2h flop SRP"
      spot: "sb:2bb,bb:call|AsTd9d"
      hand: "7h2h"
      player: BB
  random_scenario:
    enabled: true
    hold_minutes: 3
    pool: ["preflop", "flop", "turn", "river"]
